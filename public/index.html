<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Calorie Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="favicon.ico" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1d4ed8" />
</head>

<body class="bg-white text-slate-900 text-base font-semibold overflow-hidden">

<div class="max-w-sm mx-auto h-screen h-[100dvh] rounded-2xl border border-blue-700 overflow-hidden flex flex-col">

  <!-- HEADER -->
  <div class="rounded-2xl flex flex-col items-center justify-start"
       style="background:#1d4ed8; color:white; height:110px;">

    <div class="flex justify-between items-center w-full px-4 mt-1">
      <button id="prevDay" class="text-xl font-bold cursor-pointer">◀</button>
      <div class="text-center leading-tight">
        <div id="dayName" class="font-bold text-base"></div>
        <div id="dayDate" class="font-bold text-sm"></div>
        <div id="totalCalories" class="font-bold text-sm"></div>
      </div>
      <button id="nextDay" class="text-xl font-bold cursor-pointer">▶</button>
    </div>

    <div class="w-full flex justify-center mt-1">
      <button id="todayButton"
        class="px-2 py-0.5 rounded text-xs font-bold bg-white text-blue-700 cursor-pointer">
        Today
      </button>
    </div>
  </div>

  <!-- LOG VIEW -->
  <div id="view-log" class="view flex-1 overflow-y-auto p-3 space-y-3">

    <!-- TEFILLIN -->
    <div class="flex items-center gap-2 border border-blue-300 rounded px-2 py-1 text-xs bg-blue-50">
      <span class="w-16">Tefillin</span>
      <input id="tefillinCheckbox" type="checkbox" class="w-4 h-4 cursor-pointer" />
      <div class="flex-1 relative">
        <input id="tefillinComment"
               class="w-full border border-blue-300 rounded px-7 py-1 text-xs bg-white" />
        <button id="tefillinClear" class="absolute right-1 top-1 text-xs cursor-pointer">✕</button>
      </div>
      <button id="tefillinMic" class="text-lg px-1 cursor-pointer">🎤</button>
    </div>

    <!-- WEIGHT -->
    <div class="flex items-center gap-2 border border-blue-300 rounded px-2 py-1 text-xs bg-blue-50">
      <span class="w-16">Weight</span>
      <div class="flex-1 relative">
        <input id="weightValue" type="number" step="0.1"
               class="w-full border border-blue-300 rounded px-7 py-1 text-xs bg-white" />
        <button id="weightClear" class="absolute right-1 top-1 text-xs cursor-pointer">✕</button>
      </div>
      <button id="weightMic" class="text-lg px-1 cursor-pointer">🎤</button>
    </div>

    <!-- EXERCISE -->
    <div class="flex items-center gap-2 border border-blue-300 rounded px-2 py-1 text-xs bg-blue-50">
      <span class="w-16">Exercise</span>
      <div class="flex-1 relative">
        <input id="exerciseComment"
               class="w-full border border-blue-300 rounded px-7 py-1 text-xs bg-white" />
        <button id="exerciseClear" class="absolute right-1 top-1 text-xs cursor-pointer">✕</button>
      </div>
      <button id="exerciseMic" class="text-lg px-1 cursor-pointer">🎤</button>
    </div>

    <!-- SHABBAT INFO -->
    <div id="shabbatInfo" class="border border-blue-300 rounded px-2 py-1 text-xs bg-yellow-50 hidden">
      <div id="shabbatCandles" class="font-semibold text-blue-800"></div>
      <div id="shabbatParsha" class="text-blue-700"></div>
    </div>

    <!-- LOG CLEAR/SAVE -->
    <div class="flex gap-2">
      <button id="logClear"
              class="flex-1 py-2 bg-red-600 text-white rounded-lg text-sm font-semibold cursor-pointer">
        Clear
      </button>
      <button id="logSave"
              class="flex-1 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold cursor-pointer">
        Save
      </button>
    </div>

    <div id="mealsList" class="space-y-3"></div>
  </div>

  <!-- ADD VIEW (SERVINGS) -->
  <div id="view-add" class="view hidden flex-1 overflow-y-auto p-3 space-y-3">

    <div class="flex gap-1.5">
      <button class="meal-toggle flex-1 py-1.5 rounded-lg border border-blue-300 text-sm font-semibold cursor-pointer"
              data-meal="breakfast">Breakfast</button>
      <button class="meal-toggle flex-1 py-1.5 rounded-lg border border-blue-300 text-sm font-semibold cursor-pointer"
              data-meal="lunch">Lunch</button>
      <button class="meal-toggle flex-1 py-1.5 rounded-lg border border-blue-300 text-sm font-semibold cursor-pointer"
              data-meal="snack">Snack</button>
      <button class="meal-toggle flex-1 py-1.5 rounded-lg border border-blue-300 text-sm font-semibold cursor-pointer"
              data-meal="dinner">Dinner</button>
    </div>

    <div class="flex items-center gap-1">
      <input id="addSearch" type="search" placeholder="Search foods..."
             class="flex-1 border border-blue-300 rounded px-2 py-1 text-sm" />
      <button id="addSearchMic" class="text-lg px-1 cursor-pointer">🎤</button>
    </div>

    <div id="addResults" class="space-y-1 max-h-60 overflow-y-auto"></div>

    <div id="addFields" class="space-y-2 text-xs text-slate-700">

      <div>
        <label class="text-xs font-semibold">Food</label>
      </div>
      <input id="addFoodName"
             class="w-full border border-blue-300 rounded px-2 py-1 text-sm bg-white" />

      <div>
        <label class="text-xs font-semibold">Comment</label>
        <input id="addComment"
               class="w-full border border-blue-300 rounded px-2 py-1 text-sm bg-slate-100"
               readonly />
      </div>

      <div>
        <label id="addCalLabel">Calories per gram</label>
        <input id="addCalories"
               type="number"
               class="w-full border border-blue-300 rounded px-2 py-1 text-sm bg-slate-100"
               readonly />
      </div>

      <div>
        <label>Serving size</label>
        <div class="flex items-center gap-1">
          <button id="servDec" class="px-2 py-1 bg-blue-200 rounded">−</button>
          <input id="addServingSize"
                 type="number"
                 class="flex-1 border border-blue-300 rounded px-2 py-1 text-sm bg-white" />
          <button id="servInc" class="px-2 py-1 bg-blue-200 rounded">+</button>
        </div>
      </div>

      <div>
        <label>Calories in this serving</label>
        <input id="addTotal"
               class="w-full border border-blue-300 rounded px-2 py-1 text-sm bg-slate-100"
               readonly />
      </div>

    </div>

    <div class="flex gap-2">
      <button id="addClear"
              class="flex-1 py-2 bg-red-600 text-white rounded-lg text-sm font-semibold cursor-pointer">
        Clear
      </button>
      <button id="addSave"
              class="flex-1 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold cursor-pointer">
        Save
      </button>
    </div>

    <div class="h-20"></div>
  </div>

  <!-- FOODS VIEW -->
  <div id="view-foods" class="view hidden flex-1 overflow-y-auto p-3 space-y-3">

    <div class="flex items-center gap-1">
      <input id="foodsSearch" type="search" placeholder="Search foods..."
             class="flex-1 border border-blue-300 rounded px-2 py-1 text-sm" />
      <button id="foodsSearchMic" class="text-lg px-1 cursor-pointer">🎤</button>
    </div>

    <div class="flex items-center justify-between">
      <label class="text-xs font-semibold">Scan UPC</label>
      <button id="scanUpcBtn"
              class="px-2 py-1 text-xs rounded border border-blue-400 text-blue-700">
        Scan UPC
      </button>
    </div>

    <div id="foodsList"
         class="mt-2 border border-blue-300 rounded divide-y max-h-40 overflow-y-auto text-sm"></div>

    <div id="foodsFields" class="space-y-2 text-xs text-slate-700 mt-2">

      <div>
        <label>Food</label>
        <input id="foodsFoodName"
               class="w-full border border-blue-300 rounded px-2 py-1 text-sm bg-white" />
      </div>

      <div>
        <label>Comment</label>
        <input id="foodsComment"
               class="w-full border border-blue-300 rounded px-2 py-1 text-sm bg-white" />
      </div>

      <div class="flex gap-1">
        <button id="foodsUnitG"
                class="flex-1 py-1.5 rounded-lg border border-blue-300 text-sm font-semibold cursor-pointer">
          Grams
        </button>
        <button id="foodsUnitEach"
                class="flex-1 py-1.5 rounded-lg border border-blue-300 text-sm font-semibold cursor-pointer">
          Pieces
        </button>
      </div>
      <input id="foodsUnit" type="hidden" value="g" />

      <div>
        <label>Calories (total for serving)</label>
        <input id="foodsCalories"
               type="number"
               class="w-full border border-blue-300 rounded px-2 py-1 text-sm bg-white" />
      </div>

      <div>
        <label>Serving size</label>
        <input id="foodsServingSize" type="number"
               class="w-full border border-blue-300 rounded px-2 py-1 text-sm bg-white" />
      </div>

      <div>
        <label id="foodsPerUnitLabel">Calories per gram</label>
        <input id="foodsPerUnit"
               class="w-full border border-blue-300 rounded px-2 py-1 text-sm bg-slate-100"
               readonly />
      </div>

      <div class="flex gap-2 mt-2">
        <button id="foodsClear"
                class="flex-1 py-2 bg-red-600 text-white rounded-lg text-sm font-semibold cursor-pointer">
          Clear
        </button>
        <button id="foodsSave"
                class="flex-1 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold cursor-pointer">
          Save
        </button>
      </div>

      <div class="flex gap-2 mt-2">
        <button id="downloadBackup"
                class="flex-1 py-2 bg-blue-500 text-white rounded-lg text-sm font-semibold cursor-pointer">
          Download Backup (XLSX)
        </button>
        <button id="restoreBackup"
                class="flex-1 py-2 bg-red-600 text-white rounded-lg text-sm font-semibold cursor-pointer">
          Restore From Backup
        </button>
      </div>

    </div>

    <div class="h-20"></div>
  </div>

  <div class="text-center text-sm font-bold text-blue-700 py-2">
    <span id="versionLabel"></span>
  </div>

  <div class="border-t border-blue-300 bg-white flex items-center justify-between px-8 py-2 text-xs">
    <button id="navLog" class="flex flex-col items-center gap-0.5 text-blue-700 cursor-pointer">
      <span class="text-lg">📊</span><span>Log</span>
    </button>
    <button id="navAdd" class="flex flex-col items-center gap-0.5 text-blue-700 cursor-pointer">
      <span class="text-lg">🍱</span><span>Servings</span>
    </button>
    <button id="navFoods" class="flex flex-col items-center gap-0.5 text-blue-700 cursor-pointer">
      <span class="text-lg">🍽️</span><span>Foods</span>
    </button>
  </div>

</div>

<!-- UPC CAMERA MODAL -->
<div id="upcModal"
     class="fixed inset-0 bg-black/80 flex flex-col items-center justify-center z-50 hidden">
  <div class="bg-white rounded-lg p-3 w-72 flex flex-col gap-2">
    <div class="flex items-center justify-between">
      <span class="text-sm font-semibold">Scan UPC</span>
      <button id="upcCloseBtn" class="text-sm px-2 py-0.5">✕</button>
    </div>
    <video id="upcVideo" class="w-full rounded bg-black" autoplay playsinline></video>
    <p class="text-xs text-gray-600">Point camera at barcode.</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>

<div id="versionLabel" class="text-center text-[10px] text-gray-400 mt-2 mb-3"></div>

</body>
</html>
