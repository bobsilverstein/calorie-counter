# Deploy the static site to a temporary Firebase Hosting PREVIEW channel for each
# pull request, then comment the throwaway URL on the PR.
#
# FORK PRs ARE SKIPPED ON PURPOSE: a pull_request from a fork cannot mint the
# OIDC id-token that Workload Identity Federation needs, and we deliberately do
# NOT use pull_request_target (which would expose the runner to untrusted fork
# code). Push a branch to THIS repo to get a preview, or rely on the live deploy
# after merge.
name: Deploy PR Preview to Firebase Hosting

on:
  pull_request:
    branches: [main]

# Least privilege.
#   contents: read        -> check out the repo
#   id-token: write       -> WIF OIDC token
#   pull-requests: write  -> comment the preview URL on the PR
permissions:
  contents: read
  id-token: write
  pull-requests: write

# One preview per PR; cancel a superseded run when new commits arrive.
concurrency:
  group: firebase-hosting-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Stamp version and deploy preview
    runs-on: ubuntu-latest
    # Skip entirely for PRs from a fork (no OIDC token available there).
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Stamp app version into public/app.js
        run: |
          set -euo pipefail
          VERSION_NUM="$(tr -cd '0-9' < version.txt)"
          if [ -z "${VERSION_NUM}" ]; then
            echo "::error file=version.txt::version.txt does not contain an integer"
            exit 1
          fi
          DATE_UTC="$(date -u +%Y-%m-%d)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          APP_VERSION="V ${VERSION_NUM} · ${DATE_UTC} · ${SHORT_SHA} (preview)"
          echo "Stamping version: ${APP_VERSION}"
          if ! grep -q '__APP_VERSION__' public/app.js; then
            echo "::error file=public/app.js::__APP_VERSION__ token not found in public/app.js"
            exit 1
          fi
          sed -i "s#__APP_VERSION__#${APP_VERSION}#g" public/app.js

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: projects/819905276769/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deploy@calorie-counter-cdcbe.iam.gserviceaccount.com

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20

      - name: Install firebase-tools
        # Pinned for reproducible previews; bump intentionally.
        run: npm install -g firebase-tools@15.20.0

      - name: Deploy preview channel
        id: preview
        run: |
          set -euo pipefail
          firebase hosting:channel:deploy "pr-${{ github.event.pull_request.number }}" \
            --project calorie-counter-cdcbe --expires 7d --json | tee channel.json
          URL="$(python3 -c "import json; d=json.load(open('channel.json')); r=d.get('result',{}); print(next(iter(r.values()),{}).get('url',''))")"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Upsert preview URL comment on the PR
        # Update a single bot comment instead of posting a new one each redeploy.
        if: steps.preview.outputs.url != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          URL: ${{ steps.preview.outputs.url }}
        run: |
          set -euo pipefail
          MARKER="<!-- fb-preview-bot -->"
          BODY="${MARKER}"$'\n'"🔎 Firebase preview deployed: ${URL} (expires in 7 days)"
          CID="$(gh api "repos/${REPO}/issues/${PR}/comments" \
            --jq "map(select(.body | startswith(\"${MARKER}\"))) | (.[0].id // empty)")"
          if [ -n "${CID}" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${CID}" -f body="${BODY}"
          else
            gh api -X POST "repos/${REPO}/issues/${PR}/comments" -f body="${BODY}"
          fi
