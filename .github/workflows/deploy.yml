# Deploy the static site in public/ to the Firebase Hosting LIVE channel.
# Trigger: every push to main (this is the production deploy).
#
# No build step — plain HTML + Tailwind (CDN) + vanilla JS + Firebase v8 compat
# SDK. We check out, stamp the version into public/app.js, authenticate to Google
# Cloud with KEYLESS Workload Identity Federation (no stored JSON key), and deploy
# the public/ tree with firebase-tools.
name: Deploy to Firebase Hosting (live)

on:
  push:
    branches: [main]
  # Allow a manual re-deploy of main from the Actions tab without a new commit.
  workflow_dispatch:

# Least privilege.
#   contents: read   -> check out the repo
#   id-token: write  -> mint the OIDC token that WIF exchanges for GCP credentials
permissions:
  contents: read
  id-token: write

# Never run two live deploys at once; let an in-flight production deploy finish.
concurrency:
  group: firebase-hosting-live
  cancel-in-progress: false

jobs:
  deploy_live:
    name: Stamp version and deploy to live
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Stamp app version into public/app.js
        # Computes "V <n> · <YYYY-MM-DD UTC> · <short-sha>" and replaces the literal
        # __APP_VERSION__ token. version.txt (repo root) is the single source for
        # the integer; bump it to "auto-version" a release.
        run: |
          set -euo pipefail
          VERSION_NUM="$(tr -cd '0-9' < version.txt)"
          if [ -z "${VERSION_NUM}" ]; then
            echo "::error file=version.txt::version.txt does not contain an integer"
            exit 1
          fi
          DATE_UTC="$(date -u +%Y-%m-%d)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          APP_VERSION="V ${VERSION_NUM} · ${DATE_UTC} · ${SHORT_SHA}"
          echo "Stamping version: ${APP_VERSION}"
          if ! grep -q '__APP_VERSION__' public/app.js; then
            echo "::error file=public/app.js::__APP_VERSION__ token not found in public/app.js"
            exit 1
          fi
          sed -i "s#__APP_VERSION__#${APP_VERSION}#g" public/app.js

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        # Keyless: exchanges the GitHub OIDC token for short-lived GCP credentials
        # and exports GOOGLE_APPLICATION_CREDENTIALS for firebase-tools to pick up.
        # The provider is scoped (attribute-condition) to THIS repo only.
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: projects/819905276769/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deploy@calorie-counter-cdcbe.iam.gserviceaccount.com

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20

      - name: Install firebase-tools
        # Pinned for reproducible deploys; bump intentionally.
        run: npm install -g firebase-tools@15.20.0

      - name: Deploy to Firebase Hosting (live)
        run: firebase deploy --only hosting --project calorie-counter-cdcbe --non-interactive
