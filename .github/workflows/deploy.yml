# Deploy the static site in public/ to the Firebase Hosting LIVE channel.
# Trigger: every push to main (this is the production deploy).
#
# There is no build step — it is plain HTML + Tailwind (CDN) + vanilla JS +
# Firebase v8 compat SDK. We just check out, stamp the version into
# public/app.js, and hand the public/ tree to the Firebase deploy action.
name: Deploy to Firebase Hosting (live)

on:
  push:
    branches: [main]
  # Allow a manual re-deploy of main from the Actions tab without a new commit.
  workflow_dispatch:

# Least privilege: this workflow only needs to read the repo contents.
# Auth to Firebase is done with the service-account secret, not the GITHUB_TOKEN.
permissions:
  contents: read

# Never run two live deploys at once, and do NOT cancel an in-flight production
# deploy if another push lands — let the first one finish, then run the next.
concurrency:
  group: firebase-hosting-live
  cancel-in-progress: false

jobs:
  deploy_live:
    name: Stamp version and deploy to live
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Stamp app version into public/app.js
        # Computes "V <n> · <YYYY-MM-DD UTC> · <short-sha>" and replaces the
        # literal __APP_VERSION__ token. version.txt (repo root) is the single
        # source for the integer; bump it to "auto-version" a release.
        run: |
          set -euo pipefail

          VERSION_NUM="$(tr -cd '0-9' < version.txt)"
          if [ -z "${VERSION_NUM}" ]; then
            echo "::error file=version.txt::version.txt does not contain an integer"
            exit 1
          fi

          DATE_UTC="$(date -u +%Y-%m-%d)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          APP_VERSION="V ${VERSION_NUM} · ${DATE_UTC} · ${SHORT_SHA}"
          echo "Stamping version: ${APP_VERSION}"

          # Fail loudly if the token is missing, so we never ship "V ???".
          if ! grep -q '__APP_VERSION__' public/app.js; then
            echo "::error file=public/app.js::__APP_VERSION__ token not found in public/app.js"
            exit 1
          fi

          # '#' delimiter avoids clashing with the '/' and '·' in the value.
          sed -i "s#__APP_VERSION__#${APP_VERSION}#g" public/app.js

          echo "Resulting versionNumber line(s):"
          grep -n 'versionNumber' public/app.js || true

      - name: Deploy to Firebase Hosting (live)
        # FirebaseExtended/action-hosting-deploy v0.10.0
        # https://github.com/FirebaseExtended/action-hosting-deploy
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CALORIE_COUNTER_CDCBE }}
          projectId: calorie-counter-cdcbe
          channelId: live
